apiVersion: v1
kind: Service
metadata:
  name: telegram-bot
  namespace: production
  labels:
    app: telegram-bot
    environment: production
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 443
    targetPort: 8443
    protocol: TCP
    name: https
  selector:
    app: telegram-bot
    version: blue  # Default to blue, will be changed by deployment
  sessionAffinity: ClientIP
---
apiVersion: v1
kind: Service
metadata:
  name: telegram-webhook
  namespace: production
  labels:
    app: telegram-webhook
    environment: production
spec:
  type: ClusterIP
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
    name: webhook
  selector:
    app: telegram-webhook
    version: blue  # Default to blue, will be changed by deployment
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: telegram-bot-ingress
  namespace: production
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "sticky"
spec:
  tls:
  - hosts:
    - api.telegram-bot.com
    - webhook.telegram-bot.com
    secretName: telegram-bot-tls
  rules:
  - host: api.telegram-bot.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: telegram-bot
            port:
              number: 80
  - host: webhook.telegram-bot.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: telegram-webhook
            port:
              number: 8001