services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - FRAGMENT_AUTO_COOKIE_REFRESH=${FRAGMENT_AUTO_COOKIE_REFRESH:-false}
    container_name: telegram-bot
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/tmp
      - /tmp/chrome-profile
      - /tmp/chrome-data
      - /tmp/chrome-cache
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - REDIS_CLUSTER_URL=${REDIS_CLUSTER_URL}
      - REDIS_CLUSTER_ENABLED=${REDIS_CLUSTER_ENABLED}
      - REDIS_CLUSTER_NODES=${REDIS_CLUSTER_NODES}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - MERCHANT_UUID=${MERCHANT_UUID}
      - API_KEY=${API_KEY}
      - SSL_CERT_PATH=${SSL_CERT_PATH}
      - SSL_KEY_PATH=${SSL_KEY_PATH}
      - WEBHOOK_ENABLED=${WEBHOOK_ENABLED}
      - WEBHOOK_HOST=${WEBHOOK_HOST}
      - WEBHOOK_PORT=${WEBHOOK_PORT}
      - WEBHOOK_PATH=${WEBHOOK_PATH}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - BALANCE_SERVICE_ENABLED=${BALANCE_SERVICE_ENABLED}
      - BALANCE_PURCHASE_ENABLED=${BALANCE_PURCHASE_ENABLED}
      - BALANCE_NOTIFICATIONS_ENABLED=${BALANCE_NOTIFICATIONS_ENABLED}
      - RECHARGE_ENABLED=${RECHARGE_ENABLED}
      - FRAGMENT_SEED_PHRASE=${FRAGMENT_SEED_PHRASE}
      - FRAGMENT_COOKIES=${FRAGMENT_COOKIES}
      - FRAGMENT_AUTO_COOKIE_REFRESH=${FRAGMENT_AUTO_COOKIE_REFRESH}
      - FRAGMENT_COOKIE_REFRESH_INTERVAL=${FRAGMENT_COOKIE_REFRESH_INTERVAL}
      - DEBUG=${DEBUG}
      - LOG_LEVEL=${LOG_LEVEL}
      - ENVIRONMENT=${ENVIRONMENT}

    depends_on:
      db:
        condition: service_healthy
      redis-cluster-creator:
        condition: service_completed_successfully
    volumes:
      - ./logs:/app/logs:rw
      - ./ssl:/app/ssl:ro
    networks:
      - bot-network
      - redis-cluster
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
      disable: false

  # Database service
  db:
    image: postgres:17.5
    container_name: telegram-bot-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=telegram_bot
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./logs:/var/log/postgresql:rw
    ports:
      - "5433:5432"
    networks:
      - bot-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telegram_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis Cluster Configuration
  redis-node-1:
    image: redis:7-bullseye
    container_name: telegram-redis-node-1
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf --port 7379 --cluster-enabled yes --cluster-config-file nodes-7379.conf --cluster-node-timeout 5000 --appendonly yes --appendfilename appendonly-7379.aof --dbfilename dump-7379.rdb
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./redis/conf/redis.conf:/etc/redis/redis.conf:ro
      - redis_node_1_data:/data
      - ./logs:/var/log/redis:rw
    ports:
      - "7379:7379"
    networks:
      - redis-cluster
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 1G
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "redis-cli -p 7379 -a ${REDIS_PASSWORD} ping >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis-node-2:
    image: redis:7-bullseye
    container_name: telegram-redis-node-2
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf --port 7380 --cluster-enabled yes --cluster-config-file nodes-7380.conf --cluster-node-timeout 5000 --appendonly yes --appendfilename appendonly-7380.aof --dbfilename dump-7380.rdb
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./redis/conf/redis.conf:/etc/redis/redis.conf:ro
      - redis_node_2_data:/data
      - ./logs:/var/log/redis:rw
    ports:
      - "7380:7380"
    networks:
      - redis-cluster
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 1G
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "redis-cli -p 7380 -a ${REDIS_PASSWORD} ping >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis-node-3:
    image: redis:7-bullseye
    container_name: telegram-redis-node-3
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf --port 7381 --cluster-enabled yes --cluster-config-file nodes-7381.conf --cluster-node-timeout 5000 --appendonly yes --appendfilename appendonly-7381.aof --dbfilename dump-7381.rdb
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./redis/conf/redis.conf:/etc/redis/redis.conf:ro
      - redis_node_3_data:/data
      - ./logs:/var/log/redis:rw
    ports:
      - "7381:7381"
    networks:
      - redis-cluster
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 1G
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "redis-cli -p 7381 -a ${REDIS_PASSWORD} ping >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Redis Replicas
  redis-replica-1:
    image: redis:7-bullseye
    container_name: telegram-redis-replica-1
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf --port 7382 --cluster-enabled yes --cluster-config-file nodes-7382.conf --cluster-node-timeout 5000 --appendonly yes --appendfilename appendonly-7382.aof --dbfilename dump-7382.rdb
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./redis/conf/redis.conf:/etc/redis/redis.conf:ro
      - redis_replica_1_data:/data
      - ./logs:/var/log/redis:rw
    ports:
      - "7382:7382"
    networks:
      - redis-cluster
    depends_on:
      redis-node-1:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 1G
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "redis-cli -p 7382 -a ${REDIS_PASSWORD} ping >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis-replica-2:
    image: redis:7-bullseye
    container_name: telegram-redis-replica-2
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf --port 7383 --cluster-enabled yes --cluster-config-file nodes-7383.conf --cluster-node-timeout 5000 --appendonly yes --appendfilename appendonly-7383.aof --dbfilename dump-7383.rdb
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./redis/conf/redis.conf:/etc/redis/redis.conf:ro
      - redis_replica_2_data:/data
      - ./logs:/var/log/redis:rw
    ports:
      - "7383:7383"
    networks:
      - redis-cluster
    depends_on:
      redis-node-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 1G
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "redis-cli -p 7383 -a ${REDIS_PASSWORD} ping >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis-replica-3:
    image: redis:7-bullseye
    container_name: telegram-redis-replica-3
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf --port 7384 --cluster-enabled yes --cluster-config-file nodes-7384.conf --cluster-node-timeout 5000 --appendonly yes --appendfilename appendonly-7384.aof --dbfilename dump-7384.rdb
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./redis/conf/redis.conf:/etc/redis/redis.conf:ro
      - redis_replica_3_data:/data
      - ./logs:/var/log/redis:rw
    ports:
      - "7384:7384"
    networks:
      - redis-cluster
    depends_on:
      redis-node-3:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 1G
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "redis-cli -p 7384 -a ${REDIS_PASSWORD} ping >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Webhook service for balance and payment processing
  webhook:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - FRAGMENT_AUTO_COOKIE_REFRESH=${FRAGMENT_AUTO_COOKIE_REFRESH:-false}
    container_name: telegram-bot-webhook
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/tmp
      - /tmp/chrome-profile
      - /tmp/chrome-data
      - /tmp/chrome-cache
      - /tmp/chrome-profile
      - /tmp/chrome-data
      - /tmp/chrome-cache
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "services.webhooks.webhook_app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
        "--workers",
        "2",
        "--access-log",
      ]
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - REDIS_CLUSTER_URL=${REDIS_CLUSTER_URL}
      - REDIS_CLUSTER_ENABLED=${REDIS_CLUSTER_ENABLED}
      - REDIS_CLUSTER_NODES=${REDIS_CLUSTER_NODES}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MERCHANT_UUID=${MERCHANT_UUID}
      - API_KEY=${API_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - WEBHOOK_HOST=${WEBHOOK_HOST}
      - WEBHOOK_PORT=${WEBHOOK_PORT}
      - WEBHOOK_PATH=${WEBHOOK_PATH}
      - DEBUG=${DEBUG}
      - LOG_LEVEL=${LOG_LEVEL}
      - ENVIRONMENT=${ENVIRONMENT}
      - FRAGMENT_SEED_PHRASE=${FRAGMENT_SEED_PHRASE}
      - FRAGMENT_COOKIES=${FRAGMENT_COOKIES}
      - FRAGMENT_AUTO_COOKIE_REFRESH=${FRAGMENT_AUTO_COOKIE_REFRESH}
      - FRAGMENT_COOKIE_REFRESH_INTERVAL=${FRAGMENT_COOKIE_REFRESH_INTERVAL}
    depends_on:
      db:
        condition: service_healthy
      redis-cluster-creator:
        condition: service_completed_successfully
    volumes:
      - ./logs:/app/logs:rw
      - ./ssl:/app/ssl:ro
      - fragment_cookies:/app/cookies:rw
    networks:
      - bot-network
      - redis-cluster
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Enhanced Nginx with SSL and WebSocket support
  nginx:
    image: nginx:bullseye
    container_name: telegram-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
      - "8081:8080" # WebSocket port
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs:/var/log/nginx:rw
    depends_on:
      app:
        condition: service_healthy
      webhook:
        condition: service_healthy
    networks:
      - bot-network
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Redis Cluster creation using redis-cli --cluster
  redis-cluster-creator:
    image: redis:7-bullseye
    container_name: telegram-redis-cluster-creator
    depends_on:
      redis-node-1:
        condition: service_healthy
      redis-node-2:
        condition: service_healthy
      redis-node-3:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
      redis-replica-3:
        condition: service_healthy
    command: ["sh", "-c", "cd /scripts && ./create_cluster.sh"]
    networks:
      - redis-cluster
    restart: "no"
    volumes:
      - ./logs:/var/log
      - ./redis/scripts:/scripts:ro
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  # Redis Cluster Monitor - автоматическая проверка состояния и восстановление
  redis-cluster-monitor:
    image: redis:7-bullseye
    container_name: telegram-redis-cluster-monitor
    depends_on:
      redis-cluster-creator:
        condition: service_completed_successfully
    command: ["sh", "-c", "cd /scripts && ./monitor_cluster_new.sh"]
    networks:
      - redis-cluster
    restart: unless-stopped
    volumes:
      - ./logs:/var/log
      - ./redis/scripts:/scripts:ro
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "echo", "OK"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: telegram-cloudflared
    restart: unless-stopped
    command:
      [
        "tunnel",
        "--config",
        "/etc/cloudflared/config.json",
        "run",
        "telegram-bot-tunnel",
      ]
    environment:
      - CLOUDFLARED_LOG_FILE=/var/log/cloudflared/cloudflared.log
    volumes:
      - ./cloudflare/cloudflared.json:/etc/cloudflared/config.json:ro
      - ./cloudflare/cloudflared-credentials.json:/etc/cloudflared/credentials.json:ro
      - ./cloudflare/cloudflared-cert.pem:/etc/cloudflared/cert.pem:ro
      - cloudflared_data:/root/.cloudflared
      - ./logs:/var/log/cloudflared:rw
    networks:
      - bot-network
    depends_on:
      webhook:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info", "telegram-bot-tunnel"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  redis_node_1_data:
    driver: local
  redis_node_2_data:
    driver: local
  redis_node_3_data:
    driver: local
  redis_replica_1_data:
    driver: local
  redis_replica_2_data:
    driver: local
  redis_replica_3_data:
    driver: local
  cloudflared_data:
    driver: local
  postgres_data:
    driver: local
  fragment_cookies:
    driver: local

networks:
  bot-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: bot-bridge
  redis-cluster:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: redis-bridge
